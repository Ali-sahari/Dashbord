<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - لوحة التحكم</title>

    <!-- Bootstrap 5.3 RTL -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Google Fonts: Cairo -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --bg-color: #f8fafc;
            --card-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            --primary-blue: #0369a1; /* Primary blue for button */
            --accent-orange: #fff7ed; /* Light orange for banner */
            --accent-orange-text: #9a3412; /* Darker orange text */
            --accent-orange-border: #fed7aa; /* Border for banner */
            --text-dark: #1e293b;
            --text-muted: #64748b;
            --input-border: #e2e8f0;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-color);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .login-card {
            background: #ffffff;
            width: 100%;
            max-width: 440px;
            border-radius: 20px;
            box-shadow: var(--card-shadow);
            padding: 40px;
            position: relative;
            border: none;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px; /* RTL context: right is top-left in visual space if we think RTL */
            background: none;
            border: none;
            font-size: 24px;
            color: #94a3b8;
            cursor: pointer;
            transition: color 0.2s;
        }
        /* Overriding for visual top-left in RTL */
        [dir="rtl"] .close-btn {
            right: auto;
            left: 20px;
        }

        .close-btn:hover {
            color: var(--text-dark);
        }

        .logo-wrapper {
            text-align: center;
            margin-bottom: 25px;
        }

        .logo-wrapper img {
            height: 80px;
            width: auto;
            object-fit: contain;
        }

        .login-title {
            color: var(--text-dark);
            font-size: 24px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 20px;
        }

        .demo-banner {
            background-color: var(--accent-orange);
            border: 1px solid var(--accent-orange-border);
            color: var(--accent-orange-text);
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .form-label {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-control {
            border: 1px solid var(--input-border);
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 15px;
            transition: all 0.2s;
            background-color: #fff;
        }

        .form-control:focus {
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 4px rgba(3, 105, 161, 0.1);
            outline: none;
        }

        .password-toggle-wrapper {
            position: relative;
        }

        .password-toggle-wrapper .toggle-icon {
            position: absolute;
            right: auto;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            cursor: pointer;
            font-size: 18px;
        }

        .login-btn {
            background-color: var(--primary-blue);
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            margin-top: 25px;
            transition: all 0.2s;
        }

        .login-btn:hover {
            background-color: #0c4a6e;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(3, 105, 161, 0.2);
        }

        .admin-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .admin-link a {
            color: #0284c7;
            text-decoration: none;
            font-weight: 600;
        }

        .admin-link a:hover {
            text-decoration: underline;
        }

        /* Shake Animation */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-10px); }
            20%, 40%, 60%, 80% { transform: translateX(10px); }
        }

        .shake {
            animation: shake 0.6s cubic-bezier(.36,.07,.19,.97) both;
        }

        .is-invalid {
            border-color: #ef4444 !important;
            box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.1) !important;
        }
    </style>
</head>

<body>

    <div class="login-card">
        <button class="close-btn" onclick="window.history.back()">
            <i class="bi bi-x"></i>
        </button>

        <div class="logo-wrapper">
            <!-- Triangular logo from image, using logo.png as fallback -->
            <img src="./UserDashboard/logo.png" alt="Logo">
        </div>

        <h1 class="login-title">تسجيل الدخول</h1>


        <form id="loginForm">
            <div class="mb-3">
                <label for="username" class="form-label">اسم المستخدم أو الإيميل</label>
                <input type="text" id="username" class="form-control" placeholder="أدخل اسم المستخدم" required>
            </div>

            <div class="mb-2">
                <label for="password" class="form-label">كلمة المرور</label>
                <div class="password-toggle-wrapper">
                    <input type="password" id="password" class="form-control" placeholder="أدخل كلمة المرور" required>
                    <i class="bi bi-eye-slash toggle-icon" id="togglePassword"></i>
                </div>
            </div>

            <button type="submit" class="login-btn">تسجيل الدخول</button>
        </form>
        <div class="text-center mt-2">
            <p>admin/123456</p>
            <p>user/123456</p>
        </div>
    </div>

    <!-- Bootstrap Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // Password Visibility Toggle
        const togglePassword = document.querySelector('#togglePassword');
        const password = document.querySelector('#password');

        togglePassword.addEventListener('click', function () {
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
            
            this.classList.toggle('bi-eye');
            this.classList.toggle('bi-eye-slash');
        });

        // Form Submission Logic
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');
            const loginCard = document.querySelector('.login-card');
            
            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();

            // Clear previous errors
            usernameInput.classList.remove('is-invalid');
            passwordInput.classList.remove('is-invalid');
            loginCard.classList.remove('shake');

            if (username === 'admin' && password === '123456') {
                // Admin Flow
                localStorage.setItem('user-type', 'admin');
                Swal.fire({
                    title: 'Welcome Admin 👋',
                    icon: 'success',
                    timer: 1500,
                    showConfirmButton: false,
                    background: '#fff',
                    color: '#1e293b'
                }).then(() => {
                    window.location.href = 'index.html';
                });
            } else if (username === 'user' && password === '123456') {
                // User Flow
                localStorage.setItem('user-type', 'user');
                Swal.fire({
                    title: 'Welcome User 👋',
                    icon: 'success',
                    timer: 1500,
                    showConfirmButton: false,
                    background: '#fff',
                    color: '#1e293b'
                }).then(() => {
                    window.location.href = './UserDashboard/home.html';
                });
            } else {
                // Error Flow
                usernameInput.classList.add('is-invalid');
                passwordInput.classList.add('is-invalid');
                loginCard.classList.add('shake');

                Swal.fire({
                    title: 'Incorrect username or password',
                    icon: 'error',
                    confirmButtonText: 'حاول مرة أخرى',
                    confirmButtonColor: '#0369a1',
                    background: '#fff',
                    color: '#1e293b'
                });
            }
        });
    </script>
</body>

</html>
