    // ============================================================
    // RENDER ENGINE
    // ============================================================
    document.addEventListener('DOMContentLoaded', () => {
        buildNavbar();
        buildPageContent();
        buildWaFloat();
        buildSidebar();
        highlightActiveNav();
        initUIInteractions();
    });

    // ────────────────────────────────────────────────────────────
    // DYNAMIC UI EVENT ATTACHMENTS (to replace lost script.js events)
    // ────────────────────────────────────────────────────────────
    function initUIInteractions() {
        const hamburgerBtn = document.getElementById('hamburger-btn');
        const sidebar = document.getElementById('sidebar');
        const currencyDropdownBtn = document.getElementById('currency-dropdown-btn');
        const currencyMenu = document.getElementById('currency-menu');
        const themeToggleBtn = document.getElementById('theme-toggle-btn');
        const themeIcon = document.getElementById('theme-icon');
        const themeText = document.getElementById('theme-text');
        const waMainBtn = document.getElementById('wa-main-btn');
        const waSubButtons = document.getElementById('wa-sub-buttons');
        const waMainIcon = document.getElementById('wa-main-icon');

        // Sidebar, Theme, and Currency toggles are now handled globally by script.js
        // If specific dynamic behavior is needed (like updating site.themeText in pageData),
        // it can be added here, but the basic toggle shouldn't be duplicated.

        // WhatsApp Floating Toggle
        if (waMainBtn && waSubButtons && waMainIcon) {
            waMainBtn.addEventListener('click', () => {
                waSubButtons.classList.toggle('show');
                if (waSubButtons.classList.contains('show')) {
                    waMainIcon.classList.remove('bi-chat-dots-fill');
                    waMainIcon.classList.add('bi-x-lg');
                } else {
                    waMainIcon.classList.remove('bi-x-lg');
                    waMainIcon.classList.add('bi-chat-dots-fill');
                }
            });
        }
    }

            </div>

            <!-- Navbar Right Section -->

                <!-- 3. Plus Button -->

                <!-- 5. Hamburger Menu -->

                        تأسسنا لنكون وجهتك المفضلة لشحن الألعاب والبطاقات الرقمية، ونعمل باستمرار على تقديم أفضل الأسعار والخدمات لجميع اللاعبين في العالم العربي.

                        ${site.copyright}
                    </div>
                </div>

    }

    // ────────────────────────────────────────────────────────────
    // FLOATING WHATSAPP
    // ────────────────────────────────────────────────────────────
    function buildWaFloat() {
        const subBtns = pageData.whatsapp.map(w => `
            <a href="${w.href}" class="wa-float-btn position-relative mb-2" style="background:#0c4a6e;color:white;">
                <i class="bi bi-whatsapp"></i>
                <span class="badge bg-success rounded-circle position-absolute top-0 start-100 translate-middle" style="font-size:11px;">${w.label}</span>
            </a>`).join('');
        document.getElementById('wa-container').innerHTML = `
            <div class="wa-sub-buttons" id="wa-sub-buttons">${subBtns}</div>
            <button class="wa-main-btn shadow" id="wa-main-btn" style="background:#0c4a6e;color:white;border:none;outline:none;">
                <i class="bi bi-chat-dots-fill" id="wa-main-icon"></i>
            </button>`;
    }

    // ────────────────────────────────────────────────────────────

        // Nav items

            const icon = item.iconClass
                ? `<i class="${item.iconClass}" style="color:${item.iconColor};"></i>`
                : `<svg style="height:20px;fill:${item.svgColor};" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="${item.svgPath}"></path></svg>`;
            return `<a style="text-decoration:none;" href="${item.href}" class="nav-item"><span>${icon}</span><span>${item.label}</span></a>`;
        }).join('') + `
            <a style="text-decoration: none;" href="#" class="nav-item text-danger" id="userLogout">

            <!-- SIDEBAR HEADER -->

                <!-- User Profile Picture -->

                    <span class="text-primary text-decoration-underline" style="font-size: 15px;">User</span>
                    <i class="bi bi-image text-secondary" style="font-size: 14px;"></i>
                </div>

                <!-- User Info Row -->
                <div class="d-flex align-items-center justify-content-center gap-2 mb-4">
                     <div class="sidebar-vip-badge shadow-sm" style="background:#F3F4F6; color:#111827; border-radius:12px; padding: 2px 8px; font-weight:700; font-size:13px; display:flex; align-items:center;">
                        ${user.vip} <i class="bi bi-star-fill ms-1" style="color:#FBBF24; font-size:12px;"></i>
                    </div>                   
                    <div class="user-name mb-0" style="font-weight:700; font-size:15px; color:#111827;">${user.name}</div>
                    <div class="user-id" style="font-size:13px; color:#6B7280;">${user.id}</div>
                    <i class="bi bi-exclamation-circle-fill text-secondary" style="font-size: 14px; margin-left:2px;"></i>
                </div>

                    </a>
                    <a href="profile.html">
                        <i class="bi bi-person-fill icon-action" style="font-size: 28px; color:#1F2937;"></i>
                    </a>
                    <i class="bi bi-box-arrow-right icon-action" style="font-size: 26px; color:#1F2937;"></i>
                </div>

                <!-- CURRENCY SELECTOR (Collapsible) -->
                <div class="currency-collapsible text-center mb-3">
                    <button class="currency-btn rounded-pill border" style="background:#FEF9C3; border-color:#FCD34D !important; color:#92400E; font-weight:700; padding:6px 24px;" id="currency-dropdown-btn">
                        <span class="me-2">USD</span> العملة <i class="bi bi-arrow-repeat ms-2" style="font-size:16px;"></i>
                    </button>
                </div>
                
                <div class="currency-menu-container" id="currency-menu">${currencyItems}</div>

                    <img src="${site.logoImg}" alt="Logo" style="height: 120px; object-fit: contain;">

                    ${site.credits.text} <span style="color: #007BFF;">${site.credits.brand}</span>

    // ────────────────────────────────────────────────────────────
    // ACTIVE NAV HIGHLIGHT
    // ────────────────────────────────────────────────────────────
    function highlightActiveNav() {
        document.querySelectorAll('.nav-item').forEach(a => {
            const href = a.getAttribute('href') || '';
            a.classList.toggle('active', href.includes(pageData.currentPage));
        });
    }
